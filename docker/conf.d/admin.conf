server {
    listen 80;
    server_name admin.ibotclaw.com;
    return 301 https://$host$request_uri;
}

server {
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' http://vc2_api:8000 http://vc2_datacenter:8003 http://vc2_search:8001";
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    listen 443 ssl;
    server_name admin.ibotclaw.com;
    ssl_certificate /etc/nginx/ssl/admin.ibotclaw.com.pem;
    ssl_certificate_key /etc/nginx/ssl/admin.ibotclaw.com.key.pem;

    # ─── Route Splitting ────────────────────────────────────────────────────────
    # auth → api
    location /api/v1/auth/ {
        set $upstream vc2_api:8000;
        resolver 127.0.0.11 valid=30s;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # admin/* → api (admin routes: accounts, logs, pipeline)
    location /api/v1/admin/ {
        set $upstream vc2_api:8000;
        resolver 127.0.0.11 valid=30s;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # pipeline/stats → api (admin_routes.py)
    location /api/v1/pipeline/ {
        set $upstream vc2_api:8000;
        resolver 127.0.0.11 valid=30s;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # datacenter/* → datacenter (rewrite strips /api/v1 prefix → /datacenter/)
    location /api/v1/datacenter/ {
        rewrite ^/api/v1/datacenter(/.*) /datacenter$1 break;
        proxy_pass http://vc2_datacenter:8003;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
    # quotes → api (not datacenter)
    location /api/v1/quotes {
        set $upstream vc2_api:8000;
        resolver 127.0.0.11 valid=30s;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # suppliers → datacenter
    location /api/v1/suppliers {
        set $upstream vc2_datacenter:8003;
        resolver 127.0.0.11 valid=30s;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # products → datacenter
    location /api/v1/products {
        set $upstream vc2_datacenter:8003;
        resolver 127.0.0.11 valid=30s;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # all other /api/v1/* → api
    location /api/v1/ {
        set $upstream vc2_api:8000;
        resolver 127.0.0.11 valid=30s;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin app
    location / {
        set $upstream vc2_admin:3001;
        resolver 127.0.0.11 valid=30s;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
