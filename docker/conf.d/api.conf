server {
    listen 80;
    server_name api.ibotclaw.com;
    return 301 https://$host$request_uri;
}

server {
    # Security headers (VC Constitution §9)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    listen 443 ssl;
    server_name api.ibotclaw.com;
    ssl_certificate /etc/nginx/ssl/api.pem;
    ssl_certificate_key /etc/nginx/ssl/api.key.pem;

    # Search proxy: /api/v1/search -> vc2_search:8001 (rewrite path)
    location /api/v1/search {
        rewrite ^/api/v1/search(.*)$ /search$1 break;
        proxy_pass http://vc2_search:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Datacenter stats/quality overviews: rewrite to /datacenter/* prefix
    location ~ ^/api/v1/datacenter/(stats|quality) {
        rewrite ^/api/v1/datacenter/(.*)$ /datacenter/$1 break;
        proxy_pass http://vc2_datacenter:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Datacenter CRUD endpoints: rewrite to /api/v1/* prefix
    location /api/v1/datacenter/ {
        rewrite ^/api/v1/datacenter/(.*)$ /api/v1/$1 break;
        proxy_pass http://vc2_datacenter:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy: /api/v1/* -> vc2_api:8000
    location /api/v1/ {
        set $upstream vc2_api:8000;
        resolver 127.0.0.11 valid=30s;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $upstream vc2_api:8000;
        resolver 127.0.0.11 valid=30s;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
