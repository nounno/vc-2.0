server {
    listen 80;
    server_name supplier.ibotclaw.com;
    return 301 https://$host$request_uri;
}

server {
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    listen 443 ssl;
    server_name supplier.ibotclaw.com;
    ssl_certificate /etc/nginx/ssl/supplier.pem;
    ssl_certificate_key /etc/nginx/ssl/supplier.key.pem;

    # Pipeline proxy: /pipeline/* -> vc2_pipeline:8002
    location /pipeline/ {
        client_max_body_size 50m;
        set $upstream vc2_pipeline:8002;
        resolver 127.0.0.11 valid=30s;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy: /api/v1/* -> vc2_api:8000
    location /api/v1/datacenter/ {
        set $upstream vc2_datacenter:8003;
        resolver 127.0.0.11 valid=30s;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/ {
        set $upstream vc2_api:8000;
        resolver 127.0.0.11 valid=30s;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
        set $upstream vc2_supplier:3002;
        resolver 127.0.0.11 valid=30s;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
