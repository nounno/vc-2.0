services:
  admin:
    build:
      context: ./apps/admin
      dockerfile: ../../docker/Dockerfile.apps
      args:
        APP_NAME: admin
    container_name: vc2_admin
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_APP_NAME=admin
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_SEARCH_URL=/search
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    networks:
      - vc2_internal
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:3001 || nc -z localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  supplier:
    build:
      context: ./apps/supplier
      dockerfile: ../../docker/Dockerfile.apps
      args:
        APP_NAME: supplier
    container_name: vc2_supplier
    ports:
      - "3002:3002"
    environment:
      - NEXT_PUBLIC_APP_NAME=supplier
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_SEARCH_URL=/search
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    networks:
      - vc2_internal
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:3002 || nc -z localhost:3002"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ./apps/web
      dockerfile: ../../docker/Dockerfile.apps
      args:
        APP_NAME: web
    container_name: vc2_web
    ports:
      - "3004:3000"
    environment:
      - NEXT_PUBLIC_APP_NAME=web
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_SEARCH_URL=/search
    networks:
      - vc2_internal
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:3004 || nc -z localhost:3004"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  search:
    build:
      context: ./apps/search
      dockerfile: ../../docker/Dockerfile.search
    container_name: vc2_search
    ports:
      - "8001:8001"
    environment:
      - SERVICE_NAME=search
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    networks:
      - vc2_internal
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/search/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  api:
    build:
      context: ./apps/api
      dockerfile: ../../docker/Dockerfile.api
    container_name: vc2_api
    ports:
      - "8000:8000"
    environment:
      - SERVICE_NAME=api
      - REDIS_HOST=${REDIS_HOST}
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    networks:
      - vc2_internal
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  pipeline:
    build:
      context: ./apps/pipeline
      dockerfile: ../../docker/Dockerfile.pipeline
    container_name: vc2_pipeline
    ports:
      - "8002:8002"
    environment:
      - SERVICE_NAME=pipeline
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    networks:
      - vc2_internal
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/pipeline/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  datacenter:
    build:
      context: ./apps/datacenter
      dockerfile: ../../docker/Dockerfile.datacenter
    container_name: vc2_datacenter
    ports:
      - "8003:8003"
    environment:
      - SERVICE_NAME=datacenter
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - REDIS_HOST=${REDIS_HOST}
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    networks:
      - vc2_internal
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  mysql:
    image: mysql:8.4
    container_name: vc2_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=Vc@2026#root
      - MYSQL_DATABASE=valuecube
      - MYSQL_USER=valuecube
      - MYSQL_PASSWORD=Vc@2026%23db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - vc2_internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pVc@2026#root"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: vc2_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vc2_internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: ./docker
      dockerfile: Dockerfile.nginx
    container_name: vc2_nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - vc2_internal
    depends_on:
      - admin
      - supplier
      - web
      - search
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  vc2_internal:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
