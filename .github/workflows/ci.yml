name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/admin/package.json

      - name: Install dependencies (admin)
        run: cd apps/admin && npm ci

      - name: Run ESLint (admin)
        run: cd apps/admin && npm run lint || true

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [admin, api, search, pipeline, datacenter, supplier, web]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Determine Dockerfile path
        id: dockerfile
        run: |
          if [ -f "apps/${{ matrix.service }}/Dockerfile" ]; then
            echo "path=apps/${{ matrix.service }}/Dockerfile" >> $GITHUB_OUTPUT
          elif [ -f "docker/Dockerfile.${{ matrix.service }}" ]; then
            echo "path=docker/Dockerfile.${{ matrix.service }}" >> $GITHUB_OUTPUT
          else
            echo "path=docker/Dockerfile.apps" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          file: ${{ steps.dockerfile.outputs.path }}
          build-args: APP_NAME=${{ matrix.service }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy via SSH
        run: |
          echo "${{ secrets.SERVER_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            cd /home/ubuntu/vc-2.0 &&
            git pull origin main &&
            docker compose build ${{ matrix.services }} &&
            docker compose up -d ${{ matrix.services }}
          "
